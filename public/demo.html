<!doctype html>
<!--
  Public MCP demo — static shell served by Express (`src/server.ts`) when you run that stack.

  - Chat logic lives in `/js/chat-ui.js` (browser) and `POST /api/chat` (server: `src/chat/chatRoute.ts`).
  - Markdown libraries load from jsDelivr below; for stricter deployments, self-host or remove Markdown rendering.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>MCP demo — chat</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        background: #f4f4f5;
        color: #18181b;
        line-height: 1.6;
      }
      body {
        max-width: 40rem;
        margin: 0 auto;
        padding: 2rem 1.5rem 3rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        line-height: 1.3;
        letter-spacing: -0.02em;
        margin: 0 0 1.25rem;
        color: #09090b;
      }
      .btn-primary {
        display: inline-block;
        padding: 0.5rem 1rem;
        border: none;
        background: #18181b;
        color: #fff;
        text-decoration: none;
        border-radius: 0.5rem;
        font-size: 0.9375rem;
        cursor: pointer;
      }
      #messages {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        border: 1px solid #e4e4e7;
        border-radius: 0.875rem;
        min-height: 26rem;
        max-height: 52rem;
        overflow: auto;
        padding: 0.75rem 0.85rem;
        background: #f2f2f7;
        margin-bottom: 1.25rem;
        box-shadow: 0 1px 2px rgb(0 0 0 / 0.04);
      }
      .bubble {
        width: fit-content;
        max-width: min(78%, 22rem);
        padding: 0.55rem 0.85rem;
        border-radius: 1.125rem;
        font-size: 0.9375rem;
        line-height: 1.45;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-wrap: break-word;
      }
      .bubble-user {
        align-self: flex-end;
        background: #007aff;
        color: #fff;
        border-radius: 1.125rem 1.125rem 0.25rem 1.125rem;
      }
      .bubble-assistant {
        align-self: flex-start;
        background: #e5e5ea;
        color: #1c1c1e;
        border-radius: 1.125rem 1.125rem 1.125rem 0.25rem;
        white-space: normal;
      }
      .bubble-assistant .md {
        display: flow-root;
      }
      .bubble-assistant .md > :first-child {
        margin-top: 0;
      }
      .bubble-assistant .md > :last-child {
        margin-bottom: 0;
      }
      .bubble-assistant .md p {
        margin: 0.35rem 0;
      }
      .bubble-assistant .md ul,
      .bubble-assistant .md ol {
        margin: 0.35rem 0;
        padding-left: 1.25rem;
      }
      .bubble-assistant .md blockquote {
        margin: 0.35rem 0;
        padding-left: 0.65rem;
        border-left: 3px solid rgb(0 0 0 / 0.12);
        color: #3f3f46;
      }
      .bubble-assistant .md pre {
        margin: 0.4rem 0;
        padding: 0.45rem 0.55rem;
        border-radius: 0.45rem;
        background: rgb(0 0 0 / 0.06);
        font-size: 0.8125rem;
        line-height: 1.4;
        white-space: pre-wrap;
        overflow-x: auto;
      }
      .bubble-assistant .md code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 0.84em;
      }
      .bubble-assistant .md p > code,
      .bubble-assistant .md li > code {
        background: rgb(0 0 0 / 0.06);
        padding: 0.1em 0.28em;
        border-radius: 0.25rem;
      }
      .bubble-assistant .md pre code {
        background: transparent;
        padding: 0;
        font-size: inherit;
      }
      .bubble-assistant .md a {
        color: #007aff;
      }
      .bubble-assistant .md h1,
      .bubble-assistant .md h2,
      .bubble-assistant .md h3 {
        font-size: 0.95em;
        font-weight: 700;
        margin: 0.5rem 0 0.25rem;
        line-height: 1.25;
      }
      .bubble-assistant .md table {
        border-collapse: collapse;
        font-size: 0.85em;
        margin: 0.35rem 0;
      }
      .bubble-assistant .md th,
      .bubble-assistant .md td {
        border: 1px solid rgb(0 0 0 / 0.12);
        padding: 0.2rem 0.45rem;
      }
      .context-panel {
        margin-bottom: 1rem;
      }
      .context-panel label {
        display: block;
        font-size: 0.8125rem;
        font-weight: 600;
        color: #3f3f46;
      }
      .context-hint {
        margin: 0.25rem 0 0.5rem;
        font-size: 0.75rem;
        line-height: 1.45;
        color: #71717a;
      }
      #user-context-json {
        display: block;
        width: 100%;
        box-sizing: border-box;
        min-height: 7rem;
        padding: 0.6rem 0.75rem;
        border: 1px solid #d4d4d8;
        border-radius: 0.5rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 0.8125rem;
        line-height: 1.45;
        color: #18181b;
        background: #fff;
        resize: vertical;
      }
      #user-context-json:focus {
        outline: 2px solid rgb(59 130 246 / 0.35);
        outline-offset: 1px;
      }
      #chat-form {
        display: flex;
        gap: 0.65rem;
        align-items: stretch;
      }
      #message-input {
        flex: 1;
        padding: 0.6rem 0.85rem;
        border: 1px solid #d4d4d8;
        border-radius: 0.5rem;
        font-size: 1rem;
      }
      #status {
        font-size: 0.875rem;
        color: #71717a;
        margin: 1rem 0 0;
        min-height: 1.25em;
      }
    </style>
  </head>
  <body>
    <h1>MCP demo agent</h1>
    <div id="messages" aria-live="polite"></div>
    <div class="context-panel">
      <label for="user-context-json">User context (JSON)</label>
      <p class="context-hint">
        Optional facts about you the assistant can use when choosing MCP tool arguments (phone, member id, etc.). Must be
        valid JSON.
      </p>
      <textarea
        id="user-context-json"
        spellcheck="false"
        autocomplete="off"
        placeholder='{
  "phone": "2125551212"
}'
      ></textarea>
    </div>
    <form id="chat-form">
      <input id="message-input" type="text" placeholder="Message…" autocomplete="off" />
      <button type="submit" class="btn-primary">Send</button>
    </form>
    <p id="status"></p>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.3/dist/purify.min.js" crossorigin="anonymous"></script>
    <script src="/js/chat-ui.js" defer></script>
  </body>
</html>
